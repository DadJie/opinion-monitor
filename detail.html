<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>舆情详情 - 舆情眼</title>
  <link rel="stylesheet" href="css/style.css?v=202603292230">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <div class="logo-icon">👁</div>
        <span>舆情眼</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="dashboard.html">数据看板</a></li>
        <li><a href="#">舆情报告</a></li>
        <li><a href="#">系统设置</a></li>
      </ul>
      <div class="header-actions">
        <button class="refresh-btn" onclick="window.location.href='index.html'">← 返回列表</button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container" style="margin-top: 30px;">
    <!-- 舆情头部 -->
    <div class="detail-header">
      <h1 class="detail-title" id="detailTitle">加载中...</h1>
      
      <div class="detail-meta">
        <span class="badge badge-category" id="detailCategory">分类</span>
        <span class="badge badge-hot" id="detailSource">来源</span>
        <span class="badge badge-new" id="detailTime">时间</span>
      </div>

      <div class="detail-info">
        <div class="info-item">
          <span class="info-label">热度指数</span>
          <span class="info-value" id="detailHeat">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">情感倾向</span>
          <span class="info-value" id="detailSentiment">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">风险等级</span>
          <span class="info-value" id="detailRisk">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">发展趋势</span>
          <span class="info-value" id="detailTrend">--</span>
        </div>
      </div>

      <p class="opinion-card-excerpt" id="detailExcerpt" style="font-size: 16px; margin-top: 15px;"></p>
      
      <!-- 新闻来源链接 -->
      <div id="detailSourceLink" style="margin-top: 20px; display: none;">
        <a href="#" target="_blank" rel="noopener noreferrer" id="newsLink" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 15px; box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2); transition: all 0.2s;">
          <span>📰</span>
          <span>查看新闻原文</span>
          <span style="font-size: 14px;">↗</span>
        </a>
      </div>
      
      <!-- 事件内容 -->
      <div class="event-content" style="margin-top: 25px; padding: 25px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
        <h3 style="font-size: 18px; font-weight: 600; color: var(--deep-blue); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
          📄 事件详情
        </h3>
        <div class="content-body" id="eventContent" style="line-height: 1.8; color: var(--neutral-dark); font-size: 15px;">
          <div style="text-align: center; padding: 30px;">
            <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
            <div>正在加载事件详情...</div>
          </div>
        </div>
      </div>
      
      <!-- 事件概要 -->
      <div class="event-summary" style="margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); border-radius: 10px; border-left: 4px solid var(--tech-blue);">
        <h3 style="font-size: 18px; font-weight: 600; color: var(--deep-blue); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
          📋 事件概要
        </h3>
        <div class="summary-content" id="eventSummary">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>

    <!-- 时间线 -->
    <div class="timeline-section">
      <h2 class="section-heading">⏱️ 事件时间线</h2>
      <div class="timeline" id="timelineList">
        <!-- 时间线将通过 JavaScript 动态加载 -->
      </div>
    </div>

    <!-- AI 分析 -->
    <div class="timeline-section ai-analysis">
      <div class="ai-badge">🤖 AI 智能分析</div>
      <h2 class="section-heading">📊 分析研判</h2>
      
      <div class="analysis-grid" id="analysisGrid">
        <!-- AI 分析将通过 JavaScript 动态加载 -->
      </div>

      <div style="margin-top: 25px;">
        <h3 class="section-heading" style="font-size: 18px;">💡 关键要点</h3>
        <ul id="keyPoints" style="padding-left: 20px; line-height: 2;">
          <!-- 关键要点将通过 JavaScript 动态加载 -->
        </ul>
      </div>
    </div>

    <!-- 相关舆情 -->
    <div class="timeline-section">
      <h2 class="section-heading">🔗 相关舆情</h2>
      <div class="opinion-list" id="relatedList">
        <!-- 相关舆情将通过 JavaScript 动态加载 -->
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2026 舆情眼 - 国内重点舆情实时监控平台 | 数据仅供参考</p>
    </div>
  </footer>

  <script src="js/main.js?v=202603292230"></script>
  <script src="js/detail-page.js?v=202603292230"></script>
</body>
</html>
