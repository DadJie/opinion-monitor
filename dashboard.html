<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据看板 - 舆情眼</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .dashboard-card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: var(--shadow-sm);
    }
    
    .sentiment-pie {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 250px;
      position: relative;
    }
    
    .pie-chart {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: conic-gradient(
        var(--positive) 0% 45%,
        var(--negative) 45% 75%,
        var(--neutral) 75% 100%
      );
    }
    
    .category-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .bar-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .bar-label {
      width: 60px;
      font-size: 14px;
      color: var(--neutral-gray);
    }
    
    .bar-container {
      flex: 1;
      height: 24px;
      background: var(--soft-gray);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--tech-blue), var(--light-blue));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      transition: width 0.5s ease;
    }
    
    .source-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    
    .source-item {
      background: var(--bg-light);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    
    .source-name {
      font-size: 13px;
      color: var(--neutral-gray);
      margin-bottom: 8px;
    }
    
    .source-count {
      font-size: 24px;
      font-weight: 700;
      color: var(--deep-blue);
    }
    
    .risk-distribution {
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
    
    .risk-item {
      flex: 1;
    }
    
    .risk-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
    }
    
    .risk-circle.high {
      background: var(--risk-high);
    }
    
    .risk-circle.medium {
      background: var(--risk-medium);
    }
    
    .risk-circle.low {
      background: var(--risk-low);
    }
    
    .risk-label {
      font-size: 13px;
      color: var(--neutral-gray);
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <div class="logo-icon">👁</div>
        <span>舆情眼</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="dashboard.html" class="active">数据看板</a></li>
        <li><a href="#">舆情报告</a></li>
        <li><a href="#">系统设置</a></li>
      </ul>
      <div class="header-actions">
        <button class="refresh-btn" onclick="loadDashboard()">🔄 刷新</button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container" style="margin-top: 30px; margin-bottom: 40px;">
    <h1 style="font-size: 28px; margin-bottom: 25px; color: var(--deep-blue);">📊 数据总览</h1>
    
    <div class="dashboard-grid">
      <!-- 情感分布 -->
      <div class="dashboard-card">
        <h3 class="sidebar-title">😊 情感倾向分布</h3>
        <div class="sentiment-pie">
          <div class="pie-chart"></div>
        </div>
        <div style="display: flex; justify-content: center; gap: 30px; margin-top: 20px;">
          <div style="text-align: center;">
            <div style="color: var(--positive); font-size: 20px; font-weight: 700;" id="positivePercent">45%</div>
            <div style="font-size: 13px; color: var(--neutral-gray);">正面</div>
          </div>
          <div style="text-align: center;">
            <div style="color: var(--negative); font-size: 20px; font-weight: 700;" id="negativePercent">30%</div>
            <div style="font-size: 13px; color: var(--neutral-gray);">负面</div>
          </div>
          <div style="text-align: center;">
            <div style="color: var(--neutral); font-size: 20px; font-weight: 700;" id="neutralPercent">25%</div>
            <div style="font-size: 13px; color: var(--neutral-gray);">中性</div>
          </div>
        </div>
      </div>

      <!-- 分类统计 -->
      <div class="dashboard-card">
        <h3 class="sidebar-title">📁 舆情分类统计</h3>
        <div class="category-bar" id="categoryBar">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 来源分布 -->
      <div class="dashboard-card">
        <h3 class="sidebar-title">📰 数据来源分布</h3>
        <div class="source-list" id="sourceList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 风险等级 -->
      <div class="dashboard-card">
        <h3 class="sidebar-title">⚠️ 风险等级分布</h3>
        <div class="risk-distribution">
          <div class="risk-item">
            <div class="risk-circle high" id="highRiskCount">0</div>
            <div class="risk-label">高风险</div>
          </div>
          <div class="risk-item">
            <div class="risk-circle medium" id="mediumRiskCount">0</div>
            <div class="risk-label">中风险</div>
          </div>
          <div class="risk-item">
            <div class="risk-circle low" id="lowRiskCount">0</div>
            <div class="risk-label">低风险</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 热度趋势 -->
    <div class="dashboard-card" style="margin-bottom: 20px;">
      <h3 class="sidebar-title">📈 7 日热度趋势</h3>
      <div style="height: 300px; display: flex; align-items: flex-end; gap: 20px; padding: 20px;" id="weekTrend">
        <!-- 动态生成 -->
      </div>
      <div style="display: flex; justify-content: space-around; padding: 0 20px; color: var(--neutral-gray); font-size: 13px;">
        <span>7 天前</span>
        <span>5 天前</span>
        <span>3 天前</span>
        <span>1 天前</span>
        <span>今天</span>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2026 舆情眼 - 国内重点舆情实时监控平台 | 数据仅供参考</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    async function loadDashboard() {
      try {
        const response = await fetch('data/opinions.json');
        const data = await response.json();
        
        // 情感分布
        const total = data.length;
        const positive = data.filter(o => o.sentiment === 'positive').length;
        const negative = data.filter(o => o.sentiment === 'negative').length;
        const neutral = data.filter(o => o.sentiment === 'neutral').length;
        
        document.getElementById('positivePercent').textContent = Math.round(positive / total * 100) + '%';
        document.getElementById('negativePercent').textContent = Math.round(negative / total * 100) + '%';
        document.getElementById('neutralPercent').textContent = Math.round(neutral / total * 100) + '%';
        
        // 分类统计
        const categories = {};
        data.forEach(o => {
          categories[o.category] = (categories[o.category] || 0) + 1;
        });
        
        const maxCount = Math.max(...Object.values(categories));
        const categoryBar = document.getElementById('categoryBar');
        categoryBar.innerHTML = Object.entries(categories).map(([cat, count]) => `
          <div class="bar-item">
            <div class="bar-label">${cat}</div>
            <div class="bar-container">
              <div class="bar-fill" style="width: ${(count / maxCount) * 100}%; min-width: 40px;">
                ${count}
              </div>
            </div>
          </div>
        `).join('');
        
        // 来源分布
        const sources = {};
        data.forEach(o => {
          sources[o.source] = (sources[o.source] || 0) + 1;
        });
        
        document.getElementById('sourceList').innerHTML = Object.entries(sources).map(([source, count]) => `
          <div class="source-item">
            <div class="source-name">${source}</div>
            <div class="source-count">${count}</div>
          </div>
        `).join('');
        
        // 风险等级
        document.getElementById('highRiskCount').textContent = data.filter(o => o.riskLevel === 'high').length;
        document.getElementById('mediumRiskCount').textContent = data.filter(o => o.riskLevel === 'medium').length;
        document.getElementById('lowRiskCount').textContent = data.filter(o => o.riskLevel === 'low').length;
        
        // 7 日趋势
        const weekData = [85, 92, 78, 95, 88, 102, 98];
        const maxHeat = Math.max(...weekData);
        document.getElementById('weekTrend').innerHTML = weekData.map((heat, i) => `
          <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;">
            <div style="width: 100%; background: linear-gradient(to top, var(--tech-blue), var(--light-blue)); 
                        height: ${(heat / maxHeat) * 100}%; border-radius: 8px 8px 0 0; 
                        display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px;
                        color: white; font-weight: 600; font-size: 14px;">
              ${heat}
            </div>
            <span style="font-size: 12px; color: var(--neutral-gray);">D${i + 1}</span>
          </div>
        `).join('');
        
      } catch (error) {
        console.error('加载看板数据失败:', error);
      }
    }
    
    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
